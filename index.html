<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveTrack Vélo</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f9;
        }

        /* Barre de contrôle supérieure */
        .controls {
            padding: 12px;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        button {
            flex: 1;
            max-width: 150px;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s;
        }

        #startBtn { background-color: #28a745; }
        #stopBtn { background-color: #dc3545; opacity: 0.5; }
        #shareBtn { background-color: #007bff; }

        button:active {
            transform: scale(0.98);
        }

        /* Conteneur de la carte Leaflet */
        #map {
            flex: 1;
            width: 100%;
        }

        /* Message Toast */
        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Barre des boutons -->
    <div class="controls">
        <button id="startBtn" onclick="startTracking()">▶ Démarrer</button>
        <button id="stopBtn" onclick="stopTracking()" disabled>⏹ Arrêter</button>
        <button id="shareBtn" onclick="shareTrackingLink()">🔗 Partager</button>
    </div>

    <!-- Emplacement de la carte -->
    <div id="map"></div>

    <!-- Notification Toast -->
    <div id="toast">Lien copié dans le presse-papier !</div>

    <!-- Scripts Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Scripts Firebase (SDK Modulaire / Compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- Code principal de l'application -->
    <script src="./app.js"></script>

    <!-- Enregistrement du Service Worker pour PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker enregistré.'))
                .catch(err => console.error('Erreur Service Worker :', err));
        }
    </script>
</body>
</html>
