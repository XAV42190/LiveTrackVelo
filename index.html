<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveTrack Vélo</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
        }

        /* Barre d'outils */
        .controls {
            padding: 10px;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        button {
            flex: 1;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #startBtn { background-color: #28a745; }
        #stopBtn { background-color: #dc3545; opacity: 0.5; }
        #shareBtn { background-color: #007bff; }

        /* Conteneur de la carte */
        #map {
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
            background-color: #e5e3df;
        }

        /* Pop-up Toast */
        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="startBtn" onclick="startTracking()">▶ Démarrer</button>
        <button id="stopBtn" onclick="stopTracking()" disabled>⏹ Arrêter</button>
        <button id="shareBtn" onclick="shareTrackingLink()">🔗 Partager</button>
    </div>

    <div id="map"></div>

    <div id="toast">Lien copié dans le presse-papier !</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase JS (Clean & Compatible avec app.js) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- Application JS -->
    <script src="./app.js"></script>

    <!-- Registration Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW actif.'))
                .catch(err => console.error('Erreur SW:', err));
        }
    </script>
</body>
</html>
