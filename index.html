<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveTrack Vélo GPS</title>
    <link rel="manifest" href="manifest.json">
    <!-- Style pour la carte Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #10b981; color: white; padding: 15px; text-align: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { background: white; color: #10b981; border: none; padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 0.95em; }
        #btn-reset { background-color: #ef4444; color: white; margin-left: 10px; }
        #username { padding: 8px; border-radius: 5px; border: none; margin-bottom: 5px; width: 80%; max-width: 250px; font-size: 0.95em; text-align: center; }
        #map { flex-grow: 1; width: 100%; }
        .status { font-size: 0.95em; margin-top: 8px; color: #d1fae5; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <h2>Mon LiveTrack Cycliste</h2>
        <!-- Saisie du prénom/nom -->
        <input type="text" id="username" placeholder="Votre prénom ou nom" value="Cycliste_Anonyme">
        <br>
        <div class="controls" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap;">
    <button id="startBtn" onclick="startTracking()" style="padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
        ▶ Démarrer le LiveTrack
    </button>
    
    <button id="stopBtn" onclick="stopTracking()" disabled style="padding: 10px 15px; background-color: #dc3545; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; opacity: 0.6;">
        ⏹ Arrêter le suivi
    </button>
    
    <button id="shareBtn" onclick="shareTrackingLink()" style="padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
        🔗 Partager le lien
    </button>
</div>

<!-- Notification temporaire lors de la copie du lien (à placer juste en dessous des boutons) -->
<div id="toast" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; z-index:1000; font-family: sans-serif;">
    Lien copié dans le presse-papier !
</div>

        <div id="status" class="status">Statut : Prêt à démarrer</div>
    </div>

    <!-- La carte de suivi en temps réel -->
    <div id="map"></div>

    <!-- Bibliothèques nécessaires -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
