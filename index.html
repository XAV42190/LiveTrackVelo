<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveTrack Vélo</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: calc(100vh - 70px); width: 100vw; }
        .controls { 
            height: 70px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #f8f9fa; 
            padding: 0 10px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 12px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #startBtn { background: #28a745; color: white; }
        #stopBtn { background: #dc3545; color: white; opacity: 0.5; }
        #shareBtn { background: #007bff; color: white; }
        #pocketBtn { background: #343a40; color: white; display: none; }

        /* Écran noir Mode Poche */
        #blackOverlay {
            display: none; /* Masqué par défaut */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            z-index: 99999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* Message Toast */
        #toast {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10000;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- CARTE LEAFLET -->
    <div id="map"></div>

    <!-- BOUTONS DE CONTRÔLE -->
    <div class="controls">
        <button id="startBtn">▶ Démarrer</button>
        <button id="stopBtn" disabled>⏹ Arrêter</button>
        <button id="shareBtn">🔗 Partager</button>
        <button id="pocketBtn">📱 Mode Poche</button>
    </div>

    <!-- MASQUE NOIR POUR MODE POCHE -->
    <div id="blackOverlay">
        🔒 ÉCRAN VERROUILLÉ<br><br>
        <small style="font-size: 14px; font-weight: normal; opacity: 0.8;">Touchez l'écran pour déverrouiller</small>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div id="toast">Lien invité copié !</div>

    <!-- ÉLÉMENTS AUDIO & VIDÉO ANTI-VEILLE -->
    <audio id="silentAudio" loop style="display:none;">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <video id="silentVideo" playsinline loop muted style="display:none; width:1px; height:1px;">
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAdtZGF0AAAAAA==" type="video/mp4">
    </video>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Application JS -->
    <script src="app.js"></script>
</body>
</html>
