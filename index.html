<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveTrack Vélo</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #blackOverlay {
    display: none; /* Masqué par défaut */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    color: #ffffff;
    z-index: 99999;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    user-select: none;
}
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f9;
        }

        .controls {
            padding: 10px;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        button {
            flex: 1;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #startBtn { background-color: #28a745; }
        #stopBtn { background-color: #dc3545; opacity: 0.5; }
        #shareBtn { background-color: #007bff; }

        #map {
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
            background-color: #e5e3df;
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="startBtn" onclick="startTracking()">▶ Démarrer</button>
        <button id="stopBtn" onclick="stopTracking()" disabled>⏹ Arrêter</button>
        <button id="shareBtn" onclick="shareTrackingLink()">🔗 Partager</button>
        <button id="pocketBtn" onclick="togglePocketMode()" style="display:none;">📱 Mode Poche</button>
    </div>

    <div id="map"></div>

    <div id="toast">Lien copié dans le presse-papier !</div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Vidéo ultra-légère en boucle pour forcer le maintien du GPS -->
    <video id="silentVideo" playsinline loop muted style="display:none; width:1px; height:1px;">
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAdtZGF0AAAAAA==" type="video/mp4">
    </video>
    
    <!-- Application JS (Ultra-léger sans SDK Firebase) -->
    <script src="./app.js"></script>

    <!-- Registration Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW actif.'))
                .catch(err => console.error('Erreur SW:', err));
        }
    </script>
    <div id="blackOverlay" onclick="togglePocketMode()">
    🔒 Écran verrouillé<br><br>
    <small style="font-size: 14px; opacity: 0.8;">Touchez l'écran pour déverrouiller</small>
</div>
</body>
</html>
